name: Context Integrity

on:
  pull_request:
  push:

jobs:
  validate-context-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate FOR_AGENTS context integrity
        run: bash scripts/validate_context_integrity.sh
